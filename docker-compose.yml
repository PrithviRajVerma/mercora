
  services:

    postgres:
      image: postgres:17
      container_name: mercora-postgres
      restart: unless-stopped

      environment:
        POSTGRES_USER: mercora
        POSTGRES_PASSWORD: mercora
        POSTGRES_DB: postgres

      ports:
        - "5432:5432"

      volumes:
        - postgres_data:/var/lib/postgresql/data

      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U mercora"]
        interval: 10s
        timeout: 5s
        retries: 5

      networks:
        - mercora-network

    adminer:
      image: adminer:latest
      container_name: mercora-adminer
      restart: unless-stopped

      depends_on:
        postgres:
          condition: service_healthy

      ports:
        - "8088:8080"

      networks:
        - mercora-network

    redis:
      image: redis:7-alpine
      container_name: mercora-redis
      restart: unless-stopped

      ports:
        - "6379:6379"

      volumes:
        - redis_data:/data

      command: redis-server --appendonly yes

      networks:
        - mercora-network

    kafka:
      image: apache/kafka:4.0.0
      container_name: mercora-kafka
      restart: unless-stopped

      ports:
        - "9092:9092"

      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      networks:
        - mercora-network

    kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: mercora-kafka-ui
      restart: unless-stopped

      depends_on:
        - kafka

      ports:
        - "8090:8080"

      environment:
        KAFKA_CLUSTERS_0_NAME: mercora
        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

      networks:
        - mercora-network

  volumes:
    postgres_data:
    redis_data:

  networks:
    mercora-network:
      driver: bridge

