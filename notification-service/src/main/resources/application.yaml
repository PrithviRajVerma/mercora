server:
  port: 8085

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: mercora
    password: mercora

  flyway:
    enabled: true
    locations: classpath:db/migration

  logging:
    level:
      org.flywaydb: DEBUG

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true